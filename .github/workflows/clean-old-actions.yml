name: Auto Delete Old GitHub Actions Runs
on:
  schedule:
    - cron: '0 2 * * *'  # 每天 2 点自动执行
  workflow_dispatch:     # 允许手动触发

permissions:
  actions: write
  contents: read

jobs:
  clean-old-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs (native gh cli)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # 配置：保留最近 30 条运行记录（可修改）
          KEEP_LATEST=5

          # 获取所有工作流运行记录，按时间倒序
          runs=$(gh run list --json databaseId,createdAt --limit 1000 | jq -r '.[].databaseId')

          # 跳过前 KEEP_LATEST 条，删除剩下所有旧记录
          count=0
          for run in $runs; do
            count=$((count+1))
            if [ $count -gt $KEEP_LATEST ]; then
              echo "Deleting old run: $run"
              gh run delete $run
            fi
          done

          echo "✅ Cleanup finished! Kept last $KEEP_LATEST runs."
